services:
  - type: web
    name: ahsan_interior
    runtime: python
    pythonVersion: 3.13
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        scope: build
      - key: ALLOWED_ORIGINS
        scope: runtime
      - key: SECRET_KEY
        scope: runtime
      - key: SMTP_USER
        scope: runtime
      - key: SMTP_PASSWORD
        scope: runtime
      - key: VITE_API_BASE_URL
        scope: runtime
